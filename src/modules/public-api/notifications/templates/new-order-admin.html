<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"> 
    <title>Nuovo Ordine Admin</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #eeeeee; padding: 20px;">
    <div style="background-color: #fff; max-width: 500px; margin: 0 auto; padding: 20px; border-left: 5px solid #C4A456;">
        <h2 style="color: #333; margin-top: 0;">🔔 Nuovo Ordine Ricevuto</h2>
        <p style="color: #555;">Hai appena ricevuto un nuovo ordine su Meravièn.</p>
        
        <table width="100%" style="margin: 20px 0; border-collapse: collapse;">
            <tr>
                <td style="padding: 8px 0; border-bottom: 1px solid #eee; color: #888;">Ordine ID:</td>
                <td style="padding: 8px 0; border-bottom: 1px solid #eee; font-weight: bold;">#{{orderNumber}}</td>
            </tr>
            <tr>
                <td style="padding: 8px 0; border-bottom: 1px solid #eee; color: #888;">Cliente:</td>
                <td style="padding: 8px 0; border-bottom: 1px solid #eee; font-weight: bold;">{{customerEmail}}</td>
            </tr>
            <tr>
                <td style="padding: 8px 0; border-bottom: 1px solid #eee; color: #888;">Totale:</td>
                <td style="padding: 8px 0; border-bottom: 1px solid #eee; font-weight: bold; color: #C4A456;">{{total}}</td>
            </tr>
        </table>
    </div>
</body>
</html>
