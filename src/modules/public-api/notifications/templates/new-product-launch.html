<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"> <title>Nuovo Arrivo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>body { background-color: #F9F9F7; margin: 0; padding: 0; } img { max-width: 100%; height: auto; }</style>
</head>
<body style="margin: 0; padding: 0 !important; background-color: #F9F9F7;">
    <center style="width: 100%; background-color: #F9F9F7;">
        <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" class="email-container">
            <tr><td height="40">&nbsp;</td></tr>
            <tr><td align="center" style="padding-bottom: 20px;"><img src="https://tuo-bucket.com/logo.png" alt="Meravièn" width="120"></td></tr>
            <tr>
                <td style="background-color: #ffffff; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                    <img src="{{product_image}}" alt="Nuova Collezione" width="600" style="width: 100%;">
                    
                    <div style="padding: 40px 30px; text-align: center;">
                        <p style="font-family: 'Montserrat', sans-serif; font-size: 12px; letter-spacing: 2px; color: #C4A456; text-transform: uppercase; font-weight: 600;">Nuova Collezione</p>
                        <h1 style="font-family: 'Playfair Display', serif; font-size: 34px; color: #1a1a1a; margin: 10px 0 20px 0;">{{launch_title}}</h1>
                        <p style="font-family: 'Montserrat', sans-serif; font-size: 15px; line-height: 26px; color: #555555;">
                            {{launch_description}}
                        </p>
                        <br>
                        <a href="{{product_link}}" style="background-color: #1a1a1a; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; color: #ffffff; text-decoration: none; padding: 16px 32px; border-radius: 2px; text-transform: uppercase; letter-spacing: 1px; display: inline-block;">
                            Scopri di più
                        </a>
                    </div>
                </td>
            </tr>
            <tr>
                <td style="padding: 30px 20px; text-align: center; font-family: 'Montserrat', sans-serif; font-size: 11px; color: #999999;">
                    <a href="{{unsubscribe_link}}" style="color: #999999; text-decoration: underline;">Disiscriviti</a>
                </td>
            </tr>
        </table>
    </center>
</body>
</html>
