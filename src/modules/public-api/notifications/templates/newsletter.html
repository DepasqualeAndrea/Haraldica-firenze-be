<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Meravièn Newsletter</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F9F9F7; margin: 0; padding: 0; }
        img { max-width: 100%; height: auto; display: block; }
        @media screen and (max-width: 600px) { .email-container { width: 100% !important; } }
    </style>
</head>
<body style="margin: 0; padding: 0 !important; background-color: #F9F9F7;">
    <center style="width: 100%; background-color: #F9F9F7;">
        <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" class="email-container">
            <tr><td height="40">&nbsp;</td></tr>
            <tr><td align="center" style="padding-bottom: 20px;"><img src="https://tuo-bucket.com/logo.png" alt="Meravièn" width="120"></td></tr>
            
            <tr>
                <td style="background-color: #ffffff; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                    <img src="{{banner_image_url}}" alt="Novità" width="600" style="width: 100%; max-width: 600px;">
                    
                    <div style="padding: 40px;">
                        <h1 style="font-family: 'Playfair Display', serif; font-size: 28px; color: #1a1a1a; margin-top: 0; text-align: center;">{{title}}</h1>
                        
                        <div style="font-family: 'Montserrat', sans-serif; font-size: 15px; line-height: 26px; color: #555555; text-align: left;">
                            {{body_content}}
                        </div>
                        
                        <div style="text-align: center; margin-top: 30px;">
                             <a href="{{cta_link}}" style="background-color: #C4A456; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; color: #ffffff; text-decoration: none; padding: 16px 32px; border-radius: 2px; text-transform: uppercase; letter-spacing: 1px; display: inline-block;">
                                {{cta_text}}
                            </a>
                        </div>
                    </div>
                </td>
            </tr>
            <tr>
                <td style="padding: 30px 20px; text-align: center;">
                    <p style="font-family: 'Montserrat', sans-serif; font-size: 11px; color: #999999;">
                        Se non vuoi più ricevere questi aggiornamenti, <a href="{{unsubscribe_link}}" style="color: #999999; text-decoration: underline;">disiscriviti qui</a>.
                    </p>
                </td>
            </tr>
            <tr><td height="40">&nbsp;</td></tr>
        </table>
    </center>
</body>
</html>
