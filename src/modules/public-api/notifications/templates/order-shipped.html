<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordine Spedito</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F9F9F7; margin: 0; padding: 0; }
        @media screen and (max-width: 600px) { .email-container { width: 100% !important; } }
    </style>
</head>
<body style="margin: 0; padding: 0 !important; background-color: #F9F9F7;">
    <center style="width: 100%; background-color: #F9F9F7;">
        <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" class="email-container">
            <tr><td height="40">&nbsp;</td></tr>
            <tr><td align="center" style="padding-bottom: 20px;"><img src="https://tuo-bucket.com/logo.png" alt="Meravièn" width="120"></td></tr>
            <tr>
                <td style="background-color: #ffffff; padding: 50px 40px; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);">
                    <table width="100%">
                        <tr>
                            <td align="center" style="font-family: 'Playfair Display', serif; font-size: 28px; color: #1a1a1a; padding-bottom: 20px;">
                                Il tuo ordine è in viaggio
                            </td>
                        </tr>
                        <tr>
                            <td align="center" style="font-family: 'Montserrat', sans-serif; font-size: 15px; line-height: 26px; color: #555555; padding-bottom: 30px;">
                                Ottime notizie!<br>
                                I tuoi prodotti Meravièn sono stati affidati al corriere <strong>{{carrier}}</strong> e sono in viaggio verso di te.
                            </td>
                        </tr>
                        <tr>
                            <td align="center" style="padding-bottom: 40px;">
                                <a href="{{trackingUrl}}" style="background-color: #C4A456; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; color: #ffffff; text-decoration: none; padding: 16px 32px; border-radius: 2px; text-transform: uppercase; letter-spacing: 1px;">
                                    Traccia Spedizione
                                </a>
                            </td>
                        </tr>
                        <tr>
                            <td align="center" style="background-color: #F9F9F7; padding: 15px; border-radius: 4px;">
                                <p style="font-family: 'Montserrat', sans-serif; font-size: 12px; color: #888888; margin: 0;">
                                    Ordine: <span style="color: #1a1a1a; font-weight: 600;">#{{orderNumber}}</span><br>
                                    Codice Tracking: <span style="color: #1a1a1a; font-weight: 600;">{{trackingNumber}}</span>
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
            <tr><td height="40">&nbsp;</td></tr>
        </table>
    </center>
</body>
</html>
